// Simplified Content Addressable Storage service for MVP
// Based on Remote Execution API v2, but simplified for initial development

syntax = "proto3";

package build.bazel.remote.cas.v1;

option java_multiple_files = true;
option java_package = "build.bazel.remote.cas.v1";

// A content digest. A digest for a given blob consists of the size of the blob
// and its hash. The hash algorithm to use is defined by the server.
message Digest {
  // The hash, in lowercase hexadecimal.
  string hash = 1;

  // The size of the blob, in bytes.
  int64 size_bytes = 2;
}

// A request message for ContentAddressableStorage.FindMissingBlobs.
message FindMissingBlobsRequest {
  // A list of the blobs to check.
  repeated Digest blob_digests = 1;
}

// A response message for ContentAddressableStorage.FindMissingBlobs.
message FindMissingBlobsResponse {
  // A list of the blobs requested *not* present in the storage.
  repeated Digest missing_blob_digests = 1;
}

// A request message for ContentAddressableStorage.BatchReadBlobs.
message BatchReadBlobsRequest {
  // The individual blob digests.
  repeated Digest digests = 1;
}

// A response message for ContentAddressableStorage.BatchReadBlobs.
message BatchReadBlobsResponse {
  // The responses to the requests.
  repeated Response responses = 1;

  // A response corresponding to a single blob that the client tried to download.
  message Response {
    // The digest to which this response corresponds.
    Digest digest = 1;

    // The raw binary data.
    bytes data = 2;

    // The result of attempting to download that blob.
    int32 status_code = 3;

    // The standard error message for the status.
    string status_message = 4;
  }
}

// A request message for ContentAddressableStorage.BatchUpdateBlobs.
message BatchUpdateBlobsRequest {
  // The individual upload requests.
  repeated Request requests = 1;

  // A request corresponding to a single blob that the client wants to upload.
  message Request {
    // The digest of the blob.
    Digest digest = 1;

    // The raw binary data.
    bytes data = 2;
  }
}

// A response message for ContentAddressableStorage.BatchUpdateBlobs.
message BatchUpdateBlobsResponse {
  // The responses to the requests.
  repeated Response responses = 1;

  // A response corresponding to a single blob that the client tried to upload.
  message Response {
    // The digest to which this response corresponds.
    Digest digest = 1;

    // The result of attempting to upload that blob.
    int32 status_code = 2;

    // The standard error message for the status.
    string status_message = 3;
  }
}

// The CAS (content-addressable storage) is used to store the inputs to and
// outputs from the execution service. Each piece of content is addressed by the
// digest of its binary data.
service ContentAddressableStorage {
  // Determine if blobs are present in the CAS.
  rpc FindMissingBlobs(FindMissingBlobsRequest) returns (FindMissingBlobsResponse) {}

  // Fetch blobs from the CAS.
  rpc BatchReadBlobs(BatchReadBlobsRequest) returns (BatchReadBlobsResponse) {}

  // Upload blobs to the CAS.
  rpc BatchUpdateBlobs(BatchUpdateBlobsRequest) returns (BatchUpdateBlobsResponse) {}
}
