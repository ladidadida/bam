include:
  - local: .gitlab/generated.gitlab-ci.yml

variables:
  UV_CACHE_DIR: .cache/uv
  # Override BAM_TOOL so all generated jobs run bam from the project venv
  # instead of a separately installed binary.
  BAM_TOOL: uv run bam

stages:
  - lint
  - test
  - build
  - deploy

# ── Reusable templates ──────────────────────────────────────────────────────

.uv_dev:
  image: python:${PYTHON_VERSION}
  variables:
    PYTHON_VERSION: "3.14"
  cache:
    key:
      files:
        - uv.lock
        - pyproject.toml
      prefix: uv-${PYTHON_VERSION}
    paths:
      - .cache/uv/
      - .venv/
  before_script:
    - pip install uv
    - uv sync --dev --frozen

.uv_release:
  image: python:${PYTHON_VERSION}
  variables:
    PYTHON_VERSION: "3.14"
    fetch_depth: 0
  cache: []
  before_script:
    - pip install uv
    - uv sync --frozen

# ── Lint ────────────────────────────────────────────────────────────────────

lint:
  extends:
    - .lint
    - .uv_dev
  stage: lint

format-check:
  extends:
    - .format-check
    - .uv_dev
  stage: lint

typecheck:
  extends:
    - .typecheck
    - .uv_dev
  stage: lint

schema-check:
  extends:
    - .schema-check
    - .uv_dev
  stage: lint

# ── Test ────────────────────────────────────────────────────────────────────

test-unit:
  extends:
    - .test-unit
    - .uv_dev
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]

test-integration:
  extends:
    - .test-integration
    - .uv_dev
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]

test-component:
  extends:
    - .test-component
    - .uv_dev
  stage: test
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]

# ── Free-threaded (GIL-less) smoke tests — allowed to fail ──────────────────
# These jobs verify bam works on free-threaded Python builds (3.13t / 3.14t).
# allow_failure: true because C-extension dependencies (grpcio, pydantic-core)
# may not yet ship free-threaded wheels; the failure would be in uv sync, not
# in bam itself.

test-unit:freethreaded:
  extends:
    - .test-unit
    - .uv_dev
  stage: test
  allow_failure: true
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13t", "3.14t"]

test-integration:freethreaded:
  extends:
    - .test-integration
    - .uv_dev
  stage: test
  allow_failure: true
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13t", "3.14t"]

test-component:freethreaded:
  extends:
    - .test-component
    - .uv_dev
  stage: test
  allow_failure: true
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.13t", "3.14t"]

# ── Build ───────────────────────────────────────────────────────────────────

build:
  extends:
    - .build
    - .uv_release
  stage: build
  needs:
    - lint
    - format-check
    - typecheck
    - schema-check
    - job: "test-unit: [3.11]"
    - job: "test-unit: [3.12]"
    - job: "test-unit: [3.13]"
    - job: "test-unit: [3.14]"
    - job: "test-integration: [3.11]"
    - job: "test-integration: [3.12]"
    - job: "test-integration: [3.13]"
    - job: "test-integration: [3.14]"
    - job: "test-component: [3.11]"
    - job: "test-component: [3.12]"
    - job: "test-component: [3.13]"
    - job: "test-component: [3.14]"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Deploy ──────────────────────────────────────────────────────────────────

# Auto-commit schema/bam.schema.json when config/schema.py changes on main.
# Requires the project's CI/CD job token to have write access:
# Settings → CI/CD → Token Access → allow this project to push.
update-schema:
  extends: .uv_dev
  stage: deploy
  needs:
    - schema-check
  script:
    - uv run bam --schema-output schema/bam.schema.json
    - git config user.name  "gitlab-ci-bot"
    - git config user.email "noreply@gitlab.com"
    - git add schema/bam.schema.json
    - |
      if git diff --cached --quiet; then
        echo "schema/bam.schema.json is already up-to-date."
      else
        git commit -m "chore: update schema/bam.schema.json [skip ci]"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:${CI_DEFAULT_BRANCH}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/bam_tool/config/schema.py

# Deploy to PyPI (automatic on tags)
deploy:pypi:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --token $PYPI_API_TOKEN
  environment:
    name: production
    url: https://pypi.org/project/bam/
  rules:
    - if: $CI_COMMIT_TAG
  dependencies:
    - build

# Deploy to Test PyPI (manual on main branch)
deploy:testpypi:main:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/bam/
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  dependencies:
    - build

# Deploy to Test PyPI (manual on merge requests)
deploy:testpypi:mr:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/bam/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  dependencies:
    - build
