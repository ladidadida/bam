image: python:3.11

stages:
  - lint
  - typecheck
  - test
  - build
  - publish

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - apt-get update && apt-get install -y npm
  - npm install -g pyright
  - pip install uv
  - uv sync

# Linting with ruff
lint:ruff:
  stage: lint
  script:
    - uv run ruff check src tests
  allow_failure: false

# Type checking with pyright
typecheck:pyright:
  stage: typecheck
  script:
    - uv run pyright
  allow_failure: false

# Unit tests
test:unit:
  stage: test
  script:
    - uv run pytest -v --tb=short -k "not component" tests/unit
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

# Component/integration tests
test:component:
  stage: test
  script:
    - uv run pytest -v --tb=short -m component tests/component
  allow_failure: false

# Build distribution
build:wheel:
  stage: build
  script:
    - uv run python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - tags
    - main
    - merge_requests

# Publish to PyPI (manual, requires CI/CD variables)
publish:pypi:
  stage: publish
  script:
    - pip install twine
    - twine upload dist/* -u __token__ -p $PYPI_TOKEN
  only:
    - tags
  when: manual
  dependencies:
    - build:wheel
