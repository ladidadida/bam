image: python:3.13

stages:
  - lint
  - typecheck
  - test
  - build
  - publish

variables:
  UV_CACHE_DIR: .cache/uv

cache:
  key:
    files:
      - pyproject.toml
      - uv.lock
  paths:
    - .cache/uv
    - .venv/

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install uv
  - uv sync --all-groups

# Linting with ruff
lint:ruff:
  stage: lint
  script:
    - uv run ruff check src tests
  allow_failure: false

# Type checking with pyright
typecheck:pyright:
  stage: typecheck
  script:
    - uv run pyright
  allow_failure: false

# Unit tests
test:unit:
  stage: test
  script:
    - uv run pytest -v --tb=short -k "not component" tests/unit

# Component/integration tests
test:component:
  stage: test
  script:
    - uv run pytest -v --tb=short -m component tests/component
  allow_failure: false

# Build distribution
build:wheel:
  stage: build
  script:
    - uv run python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - tags
    - main
    - merge_requests

# Publish to PyPI (manual, requires CI/CD variables)
publish:pypi:
  stage: publish
  script:
    - uv run twine upload dist/* -u __token__ -p $PYPI_TOKEN
  only:
    - tags
  when: manual
  dependencies:
    - build:wheel
