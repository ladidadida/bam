image: python:3.13

stages:
  - lint
  - typecheck
  - test
  - build
  - deploy

variables:
  UV_CACHE_DIR: .cache/uv

cache:
  key:
    files:
      - pyproject.toml
      - uv.lock
  paths:
    - .cache/uv
    - .venv/

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install uv
  - uv sync --all-groups

# Linting with ruff
lint:ruff:
  stage: lint
  script:
    - uv run ruff check src tests
  allow_failure: false

# Type checking with pyright
typecheck:pyright:
  stage: typecheck
  script:
    - uv run pyright
  allow_failure: false

# Unit tests
test:unit:
  stage: test
  script:
    - uv run pytest -v --tb=short -k "not component" tests/unit

# Component/integration tests
test:component:
  stage: test
  script:
    - uv run pytest -v --tb=short -m component tests/component
  allow_failure: false

# Build distribution
build:wheel:
  stage: build
  script:
    - rm -rf dist/
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - tags
    - main
    - merge_requests

# Deploy to PyPI (automatic on tags)
deploy:pypi:
  stage: deploy
  script:
    - uv publish --token $PYPI_API_TOKEN
  environment:
    name: production
    url: https://pypi.org/project/cscd/
  only:
    - tags
  except:
    - branches
  dependencies:
    - build:wheel

# Deploy to Test PyPI (manual on main branch)
deploy:testpypi:main:
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/cscd/
  when: manual
  only:
    - main
  except:
    - tags
  dependencies:
    - build:wheel

# Deploy to Test PyPI (manual on merge requests)
deploy:testpypi:mr:
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/cscd/
  when: manual
  only:
    - merge_requests
  dependencies:
    - build:wheel
