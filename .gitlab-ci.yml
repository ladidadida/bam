include:
  - local: .gitlab/generated.gitlab-ci.yml

stages:
  - lint
  - test
  - build
  - deploy

# ── Reusable templates ──────────────────────────────────────────────────────

.uv_dev:
  image: python:${PYTHON_VERSION}
  variables:
    PYTHON_VERSION: "3.13"
  cache:
    key:
      files:
        - uv.lock
        - pyproject.toml
      prefix: uv-${PYTHON_VERSION}
    paths:
      - .cache/pip
      - .venv/
  before_script:
    - pip install uv
    - uv sync --dev --frozen
    - uv tool install bam-tool
    - export PATH="$HOME/.local/bin:$PATH"

.uv_release:
  image: python:${PYTHON_VERSION}
  variables:
    PYTHON_VERSION: "3.13"
  cache: []
  before_script:
    - pip install uv
    - uv sync --frozen

# ── Lint ────────────────────────────────────────────────────────────────────

lint:
  extends:
    - .lint
    - .uv_dev
  stage: lint

format-check:
  extends:
    - .format-check
    - .uv_dev
  stage: lint

typecheck:
  extends:
    - .typecheck
    - .uv_dev
  stage: lint

# ── Test ────────────────────────────────────────────────────────────────────

test-unit:
  extends:
    - .test-unit
    - .uv_dev
  stage: test

test-integration:
  extends:
    - .test-integration
    - .uv_dev
  stage: test

test-component:
  extends:
    - .test-component
    - .uv_dev
  stage: test

test:
  extends:
    - .test
    - .uv_dev
  stage: test

# ── Build ───────────────────────────────────────────────────────────────────

build:
  extends:
    - .build
    - .uv_dev
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Deploy ──────────────────────────────────────────────────────────────────

# Deploy to PyPI (automatic on tags)
deploy:pypi:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --token $PYPI_API_TOKEN
  environment:
    name: production
    url: https://pypi.org/project/bam/
  rules:
    - if: $CI_COMMIT_TAG
  dependencies:
    - build

# Deploy to Test PyPI (manual on main branch)
deploy:testpypi:main:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/bam/
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  dependencies:
    - build

# Deploy to Test PyPI (manual on merge requests)
deploy:testpypi:mr:
  extends: .uv_release
  stage: deploy
  script:
    - uv publish --publish-url https://test.pypi.org/legacy/ --token $PYPI_TEST_API_TOKEN
  environment:
    name: test
    url: https://test.pypi.org/project/bam/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  dependencies:
    - build
