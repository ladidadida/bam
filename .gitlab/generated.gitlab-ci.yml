# Generated by bam ci generate — do not edit manually.
#
# These are reusable job *templates*. Extend them to create real jobs by adding
# your own image, before_script, and any other overrides. Example:
#
#   lint:
#     extends: .lint             # <-- template name
#     image: python:3.13         # <-- your image
#     before_script:             # <-- your setup
#       - pip install uv
#       - uv sync --dev --frozen
#
# When stages are defined, concrete jobs must declare the same stage as their
# template (GitLab does not inherit stage through extends).
#
# Reference: https://docs.gitlab.com/ee/ci/yaml/#extends

stages:
  - lint
  - test
  - build

# ─── lint ─────────────────────────────────────────────────────────────────────
.lint:
  stage: lint
  script:
    - bam lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.format-check:
  stage: lint
  script:
    - bam format-check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.typecheck:
  stage: lint
  script:
    - bam typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── test ─────────────────────────────────────────────────────────────────────
.test-unit:
  stage: test
  script:
    - bam test-unit
  artifacts:
    paths:
      - .reports/junit-unit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.test-integration:
  stage: test
  script:
    - bam test-integration
  artifacts:
    paths:
      - .reports/junit-integration.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.test-component:
  stage: test
  script:
    - bam test-component
  artifacts:
    paths:
      - .reports/junit-component.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.test:
  stage: test
  needs:
    - test-unit
    - test-integration
    - test-component
  script:
    - bam test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── build ────────────────────────────────────────────────────────────────────
.build:
  stage: build
  needs:
    - lint
    - typecheck
    - test
  script:
    - bam build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.ci:
  stage: build
  needs:
    - lint
    - format-check
    - typecheck
    - test
  script:
    - bam ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
