name: cascache Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cascache-integration:
    name: Test with real cascache server
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Run cascache integration tests
      run: |
        cd tests/integration-cascache
        docker compose up --abort-on-container-exit --exit-code-from bam
      
    - name: Clean up
      if: always()
      run: |
        cd tests/integration-cascache
        docker compose down -v
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cascache-integration-test-results
        path: tests/integration-cascache/*.xml
        retention-days: 7
