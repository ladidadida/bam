[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "cascade"
dynamic = ["version"]
description = "**Cascade** is a content-addressed workflow orchestration tool that brings the power of content-addressable storage (CAS) to everyday development workflows"
readme = "README.md"
license = { text = "MIT" }
authors = [
  { name = "ladidadida", email = "stefan@dalada.de" },
]
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = []

[dependency-groups]
dev = [
  "pytest>=7.4",
  "pytest-cov>=4.1",
  "ruff>=0.1",
  "pyright>=1.1",
  "build>=1.0",
  "twine>=4.0",
  "python-semantic-release>=8.0",
]

[project.scripts]
cascade = "cascade.cli:main"

[tool.hatch.version]
path = "src/cascade/_version.py"
pattern = '__version__ = "(?P<version>[^\"]+)"'

[tool.hatch.build.targets.sdist]
include = [
  "src",
  "tests",
  "README.md",
  "LICENSE",
  "pytest.ini",
  "pyrightconfig.json",
]

[tool.pytest.ini_options]
addopts = "--strict-markers"
markers = [
  "component: marks tests as component-level (integration, CLI, fixtures)",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # isort
  "W",    # pycodestyle warnings
  "C90",  # mccabe
  "UP",   # pyupgrade
]
extend-ignore = [
  "E501",  # line too long (handled by formatter)
]

[tool.semantic_release]
version_pattern = '__version__ = "{version}"'
version_variable = "src/cascade/_version.py:__version__"
build_command = "uv run python -m build"
upload_to_pypi = false
upload_to_release_tag = true
commit_message = "chore: bump version to {version}"
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "main|master"
prerelease = false

[tool.ruff.format]
quote-style = "double"
