version: '3.8'

services:
  pycas:
    image: python:3.13-slim
    container_name: cascade-test-pycas
    command: >
      bash -c '
        apt-get update && apt-get install -y git &&
        pip install uv &&
        uv tool install --from git+https://gitlab.com/cascascade/cascache pycas &&
        uv tool run pycas serve
          --host 0.0.0.0
          --port 50051
          --storage-path /tmp/pycas-storage
          --log-level DEBUG
      '
    ports:
      - "50051:50051"
    volumes:
      - pycas-storage:/tmp/pycas-storage
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 50051)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  cascade-client:
    image: python:3.13-slim
    container_name: cascade-test-client
    depends_on:
      pycas:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - cascade-cache:/workspace/.cascade/cache
    environment:
      - CASCADE_CAS_URL=grpc://pycas:50051
    command: >
      bash -c '
        apt-get update && apt-get install -y git &&
        pip install uv &&
        uv sync &&
        uv run pytest tests/integration-pycas/test_pycas_integration.py -v
      '

volumes:
  pycas-storage:
  cascade-cache:
