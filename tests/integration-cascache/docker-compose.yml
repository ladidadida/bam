services:
  cascache:
    image: python:3.14-slim
    container_name: bam-test-cascache
    command: >
      bash -c '
        pip install cascache_server &&
        python -m cascache_server
      '
    environment:
      - CAS_HOST=0.0.0.0
      - CAS_PORT=50051
      - CAS_STORAGE_PATH=/tmp/cascache-storage
      - CAS_LOG_LEVEL=DEBUG
    ports:
      - "50051:50051"
    volumes:
      - cascache-storage:/tmp/cascache-storage
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 50051)); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  bam-client:
    image: python:3.14-slim
    container_name: bam-test-client
    depends_on:
      cascache:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - bam-cache:/workspace/.bam/cache
    environment:
      - BAM_CAS_URL=grpc://cascache:50051
      - UV_PROJECT_ENVIRONMENT=/tmp/.venv  # Use container-specific venv location
    command: >
      bash -c '
        pip install uv &&
        uv sync &&
        uv run pytest tests/integration-cascache/test_cascache_integration.py -v
      '

volumes:
  cascache-storage:
  bam-cache:
