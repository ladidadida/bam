version: 1

cache:
  local:
    path: .bam/cache

tasks:
  task1:
    command: echo "Task 1 running" && sleep 0.3
    
  task2:
    command: echo "Task 2 running" && sleep 0.2 && exit 1
    
  task3:
    command: echo "Task 3 running" && sleep 0.3
    depends_on:
      - task1
      
  task4:
    command: echo "Task 4 running"
    depends_on:
      - task2
      - task3
